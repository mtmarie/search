<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Search</title>
        <link href="styles.css" rel="stylesheet">
    </head>
    <body>
        <form action="https://www.google.com/search">
            <div class="left">
                all these words:
                <input type="text" name="as_q" placeholder="All these words">
            </div>
            <div class="left">
                this exact word or phrase:
                <input type="text" name="as_epq" placeholder="This exact word or phrase">
            </div>
            <div class="left">
                any of these words:
                <input type="text" name="as_oq" placeholder="Any of these words">
            </div>
            <div class="left">
                none of these words:
                <input type="text" name="as_eq" placeholder="None of these words">
            </div>
            <div class="center">
                <button type="submit" id="submit">Advanced Search</button>
            </div>
            <input type="hidden" name="sclient" value="img">
        </form>
      <a href="/search/">search</a>
      <a href="imagesearch.html">image search</a>
    </body>
</html>
